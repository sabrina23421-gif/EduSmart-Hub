<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="dashboard">

  <h3>Tambah Artikel</h3>
  <input type="text" id="judul" placeholder="Judul">
  <textarea id="isi" placeholder="Isi artikel"></textarea>
  <button onclick="tambahArtikel()">Tambah</button>

  <h3>Daftar Artikel</h3>
  <div id="listAdmin"></div>

  <h3>Statistik</h3>
  <p>Total Artikel: <span id="totalArtikel"></span></p>

</div>

<script src="script.js"></script>
</body>
</html>
